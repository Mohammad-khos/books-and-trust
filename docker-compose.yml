version: "3.8"
services:
  redis:
    image: redis:${REDIS_VERSION}-${REDIS_TAG}
    container_name: redis_container
    restart: always
    pids_limit: 200
    mem_limit: 1g
    memswap_limit: 1g
    stop_grace_period: 30s
    ports:
      - "6379:6379"
    command: redis-server --requirepass $REDIS_PASSWORD --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app
  user_db:
    image: postgres:${POSTGRES_VERSION}
    container_name: user_postgres_db
    restart: unless-stopped
    init: true
    read_only: false
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    cpus: "1.0"
    mem_limit: 1g
    memswap_limit: 1g
    stop_grace_period: 30s
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $USER_DB_USER -d $USER_DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db
  user_migration:
    image: migrate/migrate:v${MIGRATE_VERSION}
    container_name: user_service_migrations
    init: true
    pids_limit: 50
    cpus: "0.5"
    mem_limit: 256m
    volumes:
      - ./services/user-service/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${USER_DB_USER}:${USER_DB_PASSWORD}@user_postgres_db:5432/${USER_DB_NAME}?sslmode=disable      
      - up
    depends_on:
      user_db:
        condition: service_healthy
    networks:
      - db

  loan_db:
    image: postgres:${POSTGRES_VERSION}
    container_name: loans_postgres_db
    restart: unless-stopped
    init: true
    read_only: false
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    cpus: "1.0"
    mem_limit: 1g
    memswap_limit: 1g
    stop_grace_period: 30s
    environment:
      POSTGRES_DB: ${LOAN_DB_NAME}
      POSTGRES_USER: ${LOAN_DB_USER}
      POSTGRES_PASSWORD: ${LOAN_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_loans_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $LOAN_DB_USER -d $LOAN_DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db
  loan_migration:
    image: migrate/migrate:v${MIGRATE_VERSION}
    container_name: loan_service_migrations
    init: true
    pids_limit: 50
    cpus: "0.5"
    mem_limit: 256m
    volumes:
      - ./services/loan-service/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${LOAN_DB_USER}:${LOAN_DB_PASSWORD}@loans_postgres_db:5432/${LOAN_DB_NAME}?sslmode=disable      
      - up
    depends_on:
      loan_db:
        condition: service_healthy
    networks:
      - db
  pgadmin_users:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: pgadmin_users
    restart: unless-stopped
    init: true
    # security_opt:
    #   - no-new-privileges:true
    pids_limit: 100
    cpus: "0.5"
    mem_limit: 512m
    memswap_limit: 512m
    stop_grace_period: 20s
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_USERS_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_USERS_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: ${PGADMIN_USERS_LISTEN_PORT}
    ports:
      - "10101:80"
    depends_on:
      - user_db
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
      - /var/lib/pgadmin:rw,nosuid,nodev,noexec,size=128m
      - /run:rw,nosuid,nodev,noexec,size=16m
    networks:
      - app
      - db

  pgadmin_loans:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: pgadmin_trusts
    restart: unless-stopped
    init: true
    # security_opt:
    #   - no-new-privileges:true
    pids_limit: 100
    cpus: "0.5"
    mem_limit: 512m
    memswap_limit: 512m
    stop_grace_period: 20s
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_LOANS_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_LOANS_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: ${PGADMIN_LOANS_LISTEN_PORT}
    ports:
      - "10102:80"
    depends_on:
      - loan_db
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
      - /var/lib/pgadmin:rw,nosuid,nodev,noexec,size=128m
      - /run:rw,nosuid,nodev,noexec,size=16m
    networks:
      - app
      - db

  api_gateway:
    build:
      context: .
      dockerfile: infrastructure/deployment/api-gateway.Dockerfile
    container_name: api_gateway_service
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 150
    cpus: "1.0"
    mem_limit: 512m
    memswap_limit: 512m
    stop_grace_period: 20s
    environment:
      USER_SERVICE_ADDR: ${USER_SERVICE_ADDR}
      LOAN_SERVICE_ADDR: ${LOAN_SERVICE_ADDR}
      GOMEMLIMIT: ${APIGATEWAY_GOMEMLIMIT}
      GOGC: ${APIGATEWAY_GOGC}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      ENVIRONMENT: ${ENVIRONMENT}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT}
    ports:
      - "${APIGATEWAY_HOST_PORT}:8081"
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "localhost:${FLUENTD_PORT}"
        tag: "docker.api-gateway"
        mode: "non-blocking"
        max-buffer-size: "4m"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
      - /run:rw,nosuid,nodev,noexec,size=16m
    depends_on:
     otel-collector:
      condition: service_started 
    networks:
      - app

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "${SWAGGER_UI_HOST_PORT}:8080"
    environment:
      - SWAGGER_JSON=${SWAGGER_JSON}
    volumes:
      - ./services/api-gateway/docs/swagger.json:/shared/swagger.json
  loki:
    image: grafana/loki:${LOKI_VERSION}
    container_name: loki
    ports:
      - "${LOKI_HOST_PORT}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app

  # --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION}
    container_name: otel-collector
    volumes:
      - ./infrastructure/deployment/otel-collector-config.yml:/etc/otelcol/config.yml
    command: ["--config=/etc/otelcol/config.yml"]
    ports:
      - "${OTLP_GRPC_HOST_PORT}:4317" # OTLP gRPC
      - "${OTLP_HTTP_HOST_PORT}:4318" # OTLP HTTP
      - "${OTLP_FLUENTD_HOST_PORT}:24224" # Fluentd
    depends_on:
      - loki
    networks:
      - app
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    volumes:
      - ./infrastructure/deployment/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "${PROMETHEUS_HOST_PORT}:9090"
    networks:
      - app
  jaeger:
    image: jaegertracing/all-in-one:${JAEGER_VERSION}
    container_name: jaeger_observability
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=${COLLECTOR_OTLP_ENABLED}
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "9411:9411"
    networks:
      - app
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    ports:
      - "${GRAFANA_HOST_PORT}:3000"
    networks:
      - app
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
  user_service:
    build:
      context: .
      dockerfile: infrastructure/deployment/user-service.Dockerfile
    container_name: user_service_container
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 150
    cpus: "1.0"
    mem_limit: 512m
    memswap_limit: 512m
    stop_grace_period: 20s
    environment:
      USERS_DB_MAX_OPEN_CONNS: ${USERS_DB_MAX_OPEN_CONNS}
      USERS_DB_MAX_IDLE_CONNS: ${USERS_DB_MAX_IDLE_CONNS}
      USERS_DB_MAX_IDLE_TIME: ${USERS_DB_MAX_IDLE_TIME}
      GOMEMLIMIT: ${USER_SERVICE_GOMEMLIMIT}
      GOGC: ${USER_SERVICE_GOGC}
      DATABASE_URI: ${USERS_DB_URI}
      USER_SERVICE_ADDR: ${USER_SERVICE_ADDR}
      ENVIRONMENT: ${ENVIRONMENT}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_AUD: ${JWT_AUD}
    ports:
      - "${USER_SERVICE_HOST_PORT}:9091"
    depends_on:
      user_db:
        condition: service_healthy
      user_migration:
        condition: service_completed_successfully

    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
      - /run:rw,nosuid,nodev,noexec,size=16m
    networks:
      - app
      - db

  loan_service:
    build:
      context: .
      dockerfile: infrastructure/deployment/loan-service.Dockerfile
    container_name: trust_service_container
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 150
    cpus: "1.0"
    mem_limit: 512m
    memswap_limit: 512m
    stop_grace_period: 20s
    environment:
      LOANS_DB_MAX_OPEN_CONNS: ${LOANS_DB_MAX_OPEN_CONNS}
      LOANS_DB_MAX_IDLE_CONNS: ${LOANS_DB_MAX_IDLE_CONNS}
      LOANS_DB_MAX_IDLE_TIME: ${LOANS_DB_MAX_IDLE_TIME}
      GOMEMLIMIT: ${LOAN_SERVICE_GOMEMLIMIT}
      GOGC: ${LOAN_SERVICE_GOGC}
      DATABASE_URI: ${LOANS_DB_URI}
      ENVIRONMENT: ${ENVIRONMENT}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT}
    ports:
      - "${LOAN_SERVICE_HOST_PORT}:9092"
    depends_on:
      loan_db:
        condition: service_healthy
      loan_migration:
        condition: service_completed_successfully
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
      - /run:rw,nosuid,nodev,noexec,size=16m
    networks:
      - app
      - db

volumes:
  postgres_user_data:
  postgres_loans_data:
  redis_data:

networks:
  db:
    driver: bridge
    # internal: true #on prodotion env
  app:
    driver: bridge
